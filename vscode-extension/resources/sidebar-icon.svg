<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>

  <!-- Magnifying glass -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="4"/>
  <line x1="65" y1="65" x2="85" y2="85" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- AI sparkle -->
  <circle cx="80" cy="35" r="3" fill="#FFD700"/>
  <circle cx="90" cy="45" r="2" fill="#FFD700"/>
  <circle cx="75" cy="48" r="2" fill="#FFD700"/>

  <!-- Code brackets -->
  <text x="35" y="95" font-family="monospace" font-size="24" fill="white" font-weight="bold">&lt;/&gt;</text>
</svg>
